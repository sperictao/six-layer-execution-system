<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Six-Layer Execution System</title>
  <desc id="desc">A rounded teal panel containing six stacked layers that represent the execution-system model.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>
  <rect x="112" y="104" width="288" height="40" rx="20" fill="#ccfbf1"/>
  <rect x="88" y="160" width="336" height="40" rx="20" fill="#99f6e4"/>
  <rect x="120" y="216" width="272" height="40" rx="20" fill="#5eead4"/>
  <rect x="96" y="272" width="320" height="40" rx="20" fill="#2dd4bf"/>
  <rect x="128" y="328" width="256" height="40" rx="20" fill="#14b8a6"/>
  <rect x="104" y="384" width="304" height="40" rx="20" fill="#0d9488"/>
</svg>
